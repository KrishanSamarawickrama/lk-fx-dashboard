services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ${DOCKER_IMAGE:-lk-fx-dashboard}:${DOCKER_TAG:-latest}
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__lkfxdb: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Security__ApiKey: ${SECURITY_API_KEY}
      Security__AdminPin: ${SECURITY_ADMIN_PIN}
      AllowedHosts: ${ALLOWED_HOSTS:-*}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
